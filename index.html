            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.zIndex = '999999';
            errorDiv.style.fontWeight = 'bold';
            errorDiv.style.fontSize = '14px';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.innerText = '系統發生異常: ' + message + ' 位於 ' + lineno + ' 行';
            document.body.appendChild(errorDiv);
        };

            var img = new Image();
            var svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
            var url = URL.createObjectURL(svgBlob);
            img.onload = function() {
                var canvas = document.createElement('canvas');
                canvas.width = 180; canvas.height = 180;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 180, 180);
                var pngDataUrl = canvas.toDataURL('image/png');
                var appleIcon = document.createElement('link');
                appleIcon.rel = 'apple-touch-icon';
                appleIcon.href = pngDataUrl;

                favicon.type = 'image/png';

            };

    <!-- React 邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 建立 React 錯誤邊界元件
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorInfo: error.toString() };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 text-center text-rose-600 bg-rose-50 h-screen flex flex-col items-center justify-center">
                            <h2 className="text-2xl font-bold mb-4">⚠️ 系統畫面渲染發生錯誤</h2>
                            <p className="bg-white p-4 rounded border border-rose-200 text-sm shadow-md font-mono max-w-2xl text-left overflow-auto">{this.state.errorInfo}</p>
                            <p className="mt-4 text-slate-500 text-sm">此錯誤已被系統捕捉，請截圖此畫面並回報給開發人員。</p>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function App() {
            const checkFirebase = (window.firebaseAPI && window.firebaseAPI.auth) ? true : false;
            const [firebaseReady, setFirebaseReady] = useState(checkFirebase);
            const [firebaseUser, setFirebaseUser] = useState(null);
            
            const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'class-315-system'; 
            const basePath = `artifacts/${appId}/public/data`;
            
            const [viewMode, setViewMode] = useState('parent-login'); 
            const [currentStudent, setCurrentStudent] = useState(null);
            const [students, setStudents] = useState([]);
            
            const [settings, setSettings] = useState({
                className: "315",
                gradingTone: "溫和鼓勵", 
                printRemark: "請家長與學生一同審視本次段考各科目範圍的熟練度，並持續配合在家複習。",
                examType: "一般", 
                showTotalAvg: true,
                showClassAvg: true,
                showProgress: true,
                enableComments: true,
                showRadarChart: true,
                subjects: []
            });

            // loginData 包含學生登入、與任課老師選擇的科目與密碼
            const [loginData, setLoginData] = useState({ seatNo: '', password: '', subjectTeacherPass: '', selectedSubject: '' });
            const [teacherPass, setTeacherPass] = useState('');
            const [showTeacherModal, setShowTeacherModal] = useState(false);
            const [showSubjectTeacherModal, setShowSubjectTeacherModal] = useState(false);
            const [analyticsSubject, setAnalyticsSubject] = useState('');
            const [subjectEditData, setSubjectEditData] = useState({}); // 任課老師修改成績專用
            
            const [editingSubject, setEditingSubject] = useState(null);
            const [editForm, setEditForm] = useState({ score: '' });
            
            const [modifyingStudent, setModifyingStudent] = useState(null);
            const [showAddStudent, setShowAddStudent] = useState(false);
            const [newStudentData, setNewStudentData] = useState({ seatNo: '', name: '', password: '' });

            const [newSubjectName, setNewSubjectName] = useState('數學');
            const [customSubjectName, setCustomSubjectName] = useState('');
            const [newSubjectScope, setNewSubjectScope] = useState('');
            const [newSubjectDate, setNewSubjectDate] = useState('');

            const [editingSubjectConfig, setEditingSubjectConfig] = useState(null);
            const [toast, setToast] = useState(null);
            const [excelDragActive, setExcelDragActive] = useState(false);
            
            // UI Modals (導師用)
            const [showQuickScoreModal, setShowQuickScoreModal] = useState(false);
            const [quickScoreSubject, setQuickScoreSubject] = useState('');
            const [quickScoreData, setQuickScoreData] = useState({});
            const [quickScoreMode, setQuickScoreMode] = useState('manual');
            const [pastedScores, setPastedScores] = useState('');

            // Custom Confirm Dialog
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

            const fileInputRef = useRef(null);
            const subjectFileInputRef = useRef(null);
            const backupFileInputRef = useRef(null);
            
            const logoClickCount = useRef(0);
            const logoClickTimer = useRef(null);
            const subjectLogoClickCount = useRef(0);
            const subjectLogoClickTimer = useRef(null);

            // ================= Firebase 初始化 =================
            useEffect(() => {
                if (!window.firebaseAPI || !window.firebaseAPI.auth) {
                    const handleReady = () => setFirebaseReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            useEffect(() => {
                if (!firebaseReady) return;
                const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.firebaseAPI;
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("登入錯誤:", e); }
                };

                initAuth();
                const unsubscribe = onAuthStateChanged(auth, user => {
                    setFirebaseUser(user);
                });
                return () => unsubscribe();
            }, [firebaseReady]);

            // ================= 監聽資料庫 =================
            useEffect(() => {
                if (!firebaseReady || !firebaseUser) return; 
                
                const { db, onSnapshot, doc, collection } = window.firebaseAPI;

                const settingsRef = doc(db, `${basePath}/settings/global`);
                const unsubSettings = onSnapshot(settingsRef, (snap) => {
                    if (snap.exists) {
                        const cloudData = typeof snap.data === 'function' ? snap.data() : snap;
                        
                        let rawSubjects = cloudData.subjects || [];
                        const normalizedSubjects = rawSubjects.map(sub => {
                            if (typeof sub === 'string') return { name: sub, date: "", scope: "未設定範圍", locked: false };
                            return { name: sub.name || "", date: sub.date || "", scope: sub.scope || "未設定", locked: sub.locked ? true : false };
                        });
                        setSettings({ 
                            ...cloudData, 
                            subjects: normalizedSubjects, 
                            examType: cloudData.examType || "一般", 
                            showRadarChart: cloudData.showRadarChart !== undefined ? cloudData.showRadarChart : true 
                        });
                    }
                }, (error) => console.error("設定檔讀取失敗:", error));

                const studentsRef = collection(db, `${basePath}/submissions`);
                const unsubStudents = onSnapshot(studentsRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    // 確保按照座號排序
                    list.sort((a, b) => String(a.seatNo || '').localeCompare(String(b.seatNo || ''), undefined, {numeric: true}));
                    setStudents(list);

                    setCurrentStudent(prev => {
                        if (prev) {
                            const updated = list.find(s => s.id === prev.id);
                            return updated || prev;
                        }
                        return prev;
                    });
                }, (error) => console.error("學生資料讀取失敗:", error));

                return () => { unsubSettings(); unsubStudents(); };
            }, [firebaseReady, firebaseUser, basePath]);

            // ================= 工具函數 =================
            const showToast = (text, type = 'success') => {
                setToast({ text, type });
                setTimeout(() => setToast(null), 3000);
            };

            const showConfirm = (message, onConfirm) => {
                setConfirmDialog({ isOpen: true, message, onConfirm });
            };

            const saveSettingsToCloud = (newSettings) => {
                const { db, doc, setDoc } = window.firebaseAPI;
                setDoc(doc(db, `${basePath}/settings/global`), newSettings)
                    .then(() => showToast("設定已同步儲存！"))
                    .catch(e => showToast(`同步失敗：${e.message}`, "error"));
            };

            const getStudentScore = (student, subName) => {
                if (!student || !student.scores) return null;
                const s = student.scores[subName];
                if (s === undefined || s === null || s === '') return null;
                return typeof s === 'number' ? s : parseFloat(s) || null;
            };

            const calculateStudentAvg = (student) => {
                if (!student || !student.scores || settings.subjects.length === 0) return 0;
                let sum = 0, validCount = 0;
                settings.subjects.forEach(sub => {
                    const val = getStudentScore(student, sub.name);
                    if (val !== null) { sum += val; validCount++; }
                });
                return validCount > 0 ? sum / validCount : 0;
            };

            const calculateClassSubjectAvg = (subjectName) => {
                if (students.length === 0) return 0;
                let sum = 0, count = 0;
                students.forEach(s => {
                    const val = getStudentScore(s, subjectName);
                    if (val !== null) { sum += val; count++; }
                });
                return count > 0 ? sum / count : 0;
            };

            const getGradeLevelStats = () => {
                const stats = { A: 0, B: 0, C: 0, D: 0, E: 0, avg: 0 };
                if (students.length === 0) return stats;
                let totalSum = 0;
                students.forEach(s => {
                    const avg = calculateStudentAvg(s);
                    totalSum += avg;
                    if (avg >= 90) stats.A++;
                    else if (avg >= 80) stats.B++;
                    else if (avg >= 70) stats.C++;
                    else if (avg >= 60) stats.D++;
                    else stats.E++;
                });
                stats.avg = totalSum / students.length;
                return stats;
            };

            const getGradeLevelName = (avg) => {
                if (avg >= 90) return "A級距 (90-100)";
                if (avg >= 80) return "B級距 (80-89)";
                if (avg >= 70) return "C級距 (70-79)";
                if (avg >= 60) return "D級距 (60-69)";
                return "E級距 (60分以下)";
            };

            const getLocalDiagnostic = (student, subName, score, classAvg, tone) => {
                if (score === null || score === undefined) return "尚未登記該科成績。";
                if (tone === "溫和鼓勵") {
                    if (score >= 90) return `${subName}表現優異，觀念通透，請繼續保持優秀手感！`;
                    if (score >= 80) return `${subName}實力良好，多一份細心與沉著就能再次突破。`;
                    if (score >= 60) return `${subName}基本分已掌握，針對錯題進行反思即可穩步前進。`;
                    return `${subName}目前稍嫌吃力，建議每日花15分鐘重新釐清觀念。`;
                } else if (tone === "積極督促") {
                    if (score >= 90) return `${subName}成績頂尖但不能自滿，應挑戰更高階的思考題。`;
                    if (score >= 80) return `${subName}觀念理解但粗心偏多，考後請確實落實錯題訂正。`;
                    if (score >= 60) return `${subName}成績中游，讀書複習必須更加主動以防退步。`;
                    return `${subName}落後較多，務必制定每天練習計畫，重新打穩基礎。`;
                } else {
                    if (score >= 90) return `${subName}維持高分，請精益求精，嚴防任何粗心失誤。`;
                    if (score >= 80) return `${subName}有中上水準，但仍需提高考卷作答的專注度。`;
                    if (score >= 60) return `${subName}在及格邊緣，核心觀念仍顯模糊，請及時補強。`;
                    return `${subName}成績已亮紅燈！觀念落後嚴重，請立即進行輔導。`;
                }
            };

            const maskName = (name) => {
                if (!name) return "";
                const strName = String(name).trim();
                const len = strName.length;
                if (len <= 1) return strName;
                if (len === 2) return strName.charAt(0) + 'O';
                let middle = '';
                for (let i = 0; i < len - 2; i++) { middle += 'O'; }
                return strName.charAt(0) + middle + strName.charAt(len - 1);
            };

            const toDateInputFormat = (d) => {
                if (!d || d === '未設定') return '';
                if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
                const parts = d.split(/[\/\-]/);
                if (parts.length === 2) return `${new Date().getFullYear()}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
                if (parts.length === 3) {
                    if (parts[0].length === 4) return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                    if (parts[2].length === 4) return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
                }
                return '';
            };

            // 導師 Modal 開啟
            const openTeacherLoginModal = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                if (e && e.stopPropagation) e.stopPropagation();
                setShowTeacherModal(true);
            };

            // 導師秘密通道：點擊三下 Logo
            const handleSecretTeacherLogin = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                logoClickCount.current += 1;
                clearTimeout(logoClickTimer.current);
                
                if (logoClickCount.current >= 3) {
                    setShowTeacherModal(true);
                    logoClickCount.current = 0; 
                } else {
                    logoClickTimer.current = setTimeout(() => {
                        logoClickCount.current = 0;
                    }, 1500); 
                }
            };

            // 任課老師秘密通道：點擊三下按鈕
            const handleSecretSubjectTeacherLogin = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                subjectLogoClickCount.current += 1;
                clearTimeout(subjectLogoClickTimer.current);
                
                if (subjectLogoClickCount.current >= 3) {
                    setLoginData({ ...loginData, selectedSubject: '', subjectTeacherPass: '' });
                    setShowSubjectTeacherModal(true);
                    subjectLogoClickCount.current = 0; 
                } else {
                    subjectLogoClickTimer.current = setTimeout(() => {
                        subjectLogoClickCount.current = 0;
                    }, 1500); 
                }
            };

            // 導師(管理者)登入處理
            const handleTeacherLoginOnMain = () => {
                const inputPwd = String(teacherPass).trim().toUpperCase();
                if (inputPwd === 'FXM315') { 
                    setViewMode('teacher-dashboard');
                    setShowTeacherModal(false);
                    setTeacherPass('');
                    showToast('✅ 成功進入導師管理介面');
                } else {
                    showToast('⛔ 管理密碼輸入錯誤，請重新確認！', 'error');
                }
            };

            // 任課老師登入處理與載入初值
            const handleSubjectTeacherLogin = () => {
                if (!loginData.selectedSubject) {
                    return showToast('請先選擇您任教的科目！', 'warning');
                }
                
                const inputPwd = String(loginData.subjectTeacherPass).trim().toUpperCase();
                if (inputPwd === 'T315') { 
                    setAnalyticsSubject(loginData.selectedSubject);
                    setViewMode('subject-analytics');
                    setShowSubjectTeacherModal(false);
                    
                    // 載入該科目所有學生目前的分數到編輯 state
                    const initialData = {};
                    students.forEach(s => {
                        const sc = getStudentScore(s, loginData.selectedSubject);
                        initialData[s.id] = sc !== null ? sc : '';
                    });
                    setSubjectEditData(initialData);

                    setLoginData({ ...loginData, subjectTeacherPass: '', selectedSubject: '' });
                    showToast(`✅ 成功進入 ${loginData.selectedSubject} 成績分析與登記面板`);
                } else {
                    showToast('⛔ 密碼輸入錯誤', 'error');
                }
            };

            // 家長與學生登入處理
            const handleParentLogin = () => {
                const seatStr = String(loginData.seatNo).trim();

                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const json = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { defval: "" });
                        
                        const cleanedJson = json.map(row => {
                            const cRow = {};
                            for (let k in row) cRow[k.replace(/^\uFEFF/, '').trim()] = row[k];
                            return cRow;
                        });
                        
                        callback(cleanedJson);
                    } catch (err) { showToast(`檔案解析失敗：${err.message}`, "error"); }
                };
                reader.readAsArrayBuffer(file);

                            const parsedVal = parseFloat(row[sub.name]);

                        id: `student_${seat}`,

                        name: maskedName,

            // 任課老師分析專用資料計算，同時計算最高分、不及格與缺考名單
            const getAnalyticsData = () => {
                if (!analyticsSubject) return null;
                
                if (students.length === 0) return { count: 0, max: '-', min: '-', avg: '-', ranges: { A:0, B:0, C:0, D:0, E:0 }, isLoaded: false, topStudents: [], failingStudents: [], missingStudents: [] };
                
                const mappedRecords = students.map(s => {
                    const inputVal = subjectEditData[s.id];
                    const sc = (inputVal !== undefined && inputVal !== '') ? parseFloat(inputVal) : null;
                    return { ...s, tempScore: isNaN(sc) ? null : sc };
                });
                
                const validRecords = mappedRecords.filter(s => s.tempScore !== null);
                const missingStudents = mappedRecords.filter(s => s.tempScore === null);
                
                if (validRecords.length === 0) return { count: 0, max: '-', min: '-', avg: '-', ranges: { A:0, B:0, C:0, D:0, E:0 }, isLoaded: true, topStudents: [], failingStudents: [], missingStudents };
                
                const max = Math.max(...validRecords.map(s => s.tempScore));
                const min = Math.min(...validRecords.map(s => s.tempScore));
                const avg = (validRecords.reduce((a, b) => a + b.tempScore, 0) / validRecords.length).toFixed(1);
                
                const ranges = { A: 0, B: 0, C: 0, D: 0, E: 0 };
                validRecords.forEach(s => {
                    if (s.tempScore >= 90) ranges.A++;
                    else if (s.tempScore >= 80) ranges.B++;
                    else if (s.tempScore >= 70) ranges.C++;
                    else if (s.tempScore >= 60) ranges.D++;
                    else ranges.E++;
                });

                const topStudents = validRecords.filter(s => s.tempScore === max);
                const failingStudents = validRecords.filter(s => s.tempScore < 60);

                return { count: validRecords.length, max, min, avg, ranges, isLoaded: true, topStudents, failingStudents, missingStudents };
            };

            const renderRadarChart = (student, compact = false) => {
                const subjectsList = settings.subjects;
                if (subjectsList.length < 3) return <div className="py-12 text-slate-400 text-sm font-bold">📊 考科不足 3 科，無法繪製雷達圖</div>;
                const size = compact ? 160 : 200, center = size / 2, maxRadius = compact ? 55 : 75, N = subjectsList.length;
                const getCoords = (index, value) => {
                    const angle = (Math.PI * 2 / N) * index - Math.PI / 2;
                    const r = ((value ? value : 0) / 100) * maxRadius;
                    return { x: center + r * Math.cos(angle), y: center + r * Math.sin(angle) };
                };
                const gridPolygons = [20, 40, 60, 80, 100].map(level => { 
                    return subjectsList.map((_, i) => `${getCoords(i, level).x},${getCoords(i, level).y}`).join(" ");
                });

                    return `${getCoords(i, getStudentScore(student, sub.name) || 0).x},${getCoords(i, getStudentScore(student, sub.name) || 0).y}`;

                                                    </div>
                                                ) : (
                                                    <div key={sub.name} className="flex items-center justify-between gap-2 py-2.5 px-3 bg-white rounded-xl border border-slate-200 shadow-sm hover:border-slate-300 transition-colors">
                                                        <div className="flex flex-col min-w-0 flex-1">
                                                            <div className="flex items-baseline gap-2 flex-wrap">
                                                                <span className="font-black text-slate-800 text-sm sm:text-base">{sub.name}</span>
                                                                <span className="text-[10px] text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{sub.date || '未設定日期'}</span>
                                                            </div>
                                                            <span className="text-xs text-slate-500 truncate mt-0.5" title={sub.scope}>{sub.scope || '未設定範圍'}</span>
                                                        </div>
                                                        <div className="flex items-center gap-1.5 shrink-0">
                                                            <label className="flex items-center gap-1 cursor-pointer bg-slate-50 px-1.5 py-1 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors">
                                                                <input type="checkbox" checked={!sub.locked} className="rounded text-emerald-600 focus:ring-emerald-500 w-3.5 h-3.5" onChange={e => {
                                                                    const newSubjects = settings.subjects.map(x => x && x.name === sub.name ? {...x, locked: !e.target.checked} : x);
                                                                    const s = {...settings, subjects: newSubjects};
                                                                    setSettings(s); saveSettingsToCloud(s);
                                                                }} />
                                                                <span className={sub.locked ? "text-rose-600 font-bold text-[10px]" : "text-emerald-600 font-bold text-[10px]"}>{sub.locked ? "鎖定" : "開放"}</span>
                                                            </label>
                                                            <button onClick={() => setEditingSubjectConfig({ originalName: sub.name, scope: sub.scope, date: sub.date })} className="flex items-center justify-center text-blue-600 hover:bg-blue-50 border border-blue-100 hover:border-blue-300 w-7 h-7 rounded-lg text-sm transition" title="修改">✏️</button>
                                                            <button onClick={() => handleDeleteSubject(sub.name)} className="flex items-center justify-center text-rose-600 hover:bg-rose-50 border border-rose-100 hover:border-rose-300 w-7 h-7 rounded-lg text-sm transition" title="刪除">🗑️</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {settings.subjects.length === 0 && (
                                                <div className="text-center bg-slate-50 rounded-xl border border-dashed border-slate-300 py-8">
                                                    <span className="text-3xl mb-2 block">📝</span>
                                                    <p className="text-slate-500 text-sm font-bold">目前尚未建立任何考試項目</p>
                                                    <p className="text-slate-400 text-xs mt-1">請使用上方表單新增，或是使用 Excel 匯入</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-grow flex flex-col gap-5">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                                    <div onDragOver={e => {e.preventDefault();setExcelDragActive(true);}} onDragLeave={() => {setExcelDragActive(false);}} onDrop={e => {e.preventDefault();setExcelDragActive(false);handleFileUpload(e.dataTransfer.files[0]);}} className={`p-8 border-2 border-dashed rounded-[2rem] text-center flex flex-col items-center justify-center transition ${excelDragActive ? 'border-[#00704A] bg-emerald-50' : 'bg-white'}`}>
                                        <span className="text-4xl mb-2">🧑‍🎓</span>
                                        <h4 className="font-bold text-sm">拖放 Excel / CSV 批次匯入【名單與成績】</h4>
                                        <p className="text-[10px] text-slate-500 mt-1">系統將自動保護學生姓名(例如：王O明)</p>
                                        <div className="flex flex-wrap gap-2 mt-4 justify-center">
                                            <button onClick={() => fileInputRef.current.click()} className="bg-slate-700 hover:bg-slate-800 text-white text-xs px-4 py-2 rounded-xl font-bold transition shadow-md">📤 匯入名單與成績</button>
                                            
                                            {/* 導師後台的快速登記 */}
                                            <button onClick={openQuickScore} className="bg-[#00704A] hover:bg-[#005a3c] text-white text-xs px-4 py-2 rounded-xl font-black transition shadow-md flex items-center gap-1 border border-emerald-700">
                                                <span>📋</span> 貼上/登記 單科成績
                                            </button>

                                            <button onClick={loadDemoData} className="bg-[#CBA258] hover:bg-[#b08b45] text-white font-bold text-xs px-3.5 py-2 rounded-xl transition shadow-md">一鍵載入正式名單</button>
                                            <button onClick={downloadStudentTemplate} className="bg-emerald-100 hover:bg-emerald-200 text-[#00704A] font-bold text-xs px-3.5 py-2 rounded-xl transition">📥 下載範本</button>
                                            <button onClick={clearDatabase} className="bg-rose-100 hover:bg-rose-200 text-rose-700 font-bold text-xs px-3.5 py-2 rounded-xl border border-rose-300 transition">清空資料</button>
                                            <button onClick={exportGradesToCSV} className="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-3.5 py-2 rounded-xl transition shadow-sm">💾 匯出 Excel</button>
                                        </div>
                                        <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .csv" onChange={e => handleFileUpload(e.target.files[0])} />
                                    </div>

                                    <div className="bg-white p-6 rounded-[2rem] border shadow-xl grid grid-cols-2 sm:grid-cols-3 gap-4">
                                        <div className="bg-slate-50 p-4 rounded-2xl border">
                                            <span className="block text-[10px] font-bold">總學生數</span>
                                            <span className="block text-2xl font-black text-[#00704A] mt-1">{students.length}</span>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border">
                                            <span className="block text-[10px] font-bold">總計登入次數</span>
                                            <span className="block text-2xl font-black text-amber-500 mt-1">
                                                {students.reduce((acc, curr) => acc + (curr.loginCount || 0), 0)}
                                            </span>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border">
                                            <span className="block text-[10px] font-bold">班級總平均</span>
                                            <span className="block text-2xl font-black text-indigo-700 mt-1">{overallStats.avg.toFixed(1)}</span>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border col-span-2 sm:col-span-3 flex justify-between items-center">
                                            <div className="text-xs text-slate-500 font-bold">A級:{overallStats.A} | B級:{overallStats.B} | C級:{overallStats.C} | 總不及格:{overallStats.E}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 系統安全備份區塊 */}
                                <div className="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4 text-slate-300">
                                    <div>
                                        <h4 className="font-bold text-white flex items-center gap-2"><span>🛡️</span> 系統安全與資料備份</h4>
                                        <p className="text-xs mt-1">匯出 JSON 格式以完整備份「所有設定與學生成績」。若有遺失可隨時還原。</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => backupFileInputRef.current.click()} className="bg-slate-700 hover:bg-slate-600 text-white text-xs px-4 py-2.5 rounded-xl font-bold transition">
                                            🔄 從備份還原
                                        </button>
                                        <button onClick={exportBackupJSON} className="bg-amber-500 hover:bg-amber-600 text-amber-950 text-xs px-4 py-2.5 rounded-xl font-bold transition shadow-md">
                                            💾 下載完整備份
                                        </button>
                                        <input type="file" ref={backupFileInputRef} className="hidden" accept=".json" onChange={e => importBackupJSON(e.target.files[0])} />
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] border shadow-xl overflow-hidden">
                                    <div className="p-5 border-b flex justify-between items-center bg-slate-50 flex-wrap gap-2">
                                        <h4 className="font-black flex items-center gap-2"><span>📋</span>班級名冊與成績總覽</h4>
                                        <div className="flex gap-2 flex-wrap">
                                            <button onClick={openQuickScore} className="bg-[#00704A] hover:bg-[#005a3c] text-white text-xs font-bold px-3 py-1.5 rounded-xl shadow-md transition-all active:scale-95">📋 貼上/快速登記 單科</button>
                                            <button onClick={() => setViewMode('batch-print')} className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-3 py-1.5 rounded-xl shadow-md transition-all active:scale-95">🖨️ 列印全班成績單</button>
                                            <button onClick={() => setShowAddStudent(!showAddStudent)} className="bg-slate-200 text-slate-800 hover:bg-slate-300 text-xs font-bold px-3 py-1.5 rounded-xl transition">{showAddStudent ? "❌ 取消" : "➕ 新增單一學生"}</button>
                                        </div>
                                    </div>

                                    {showAddStudent && (
                                        <div className="p-5 bg-emerald-50/50 flex flex-wrap gap-4 items-end animate-fade-in border-b border-emerald-100">
                                            <div className="w-full sm:w-1/4">
                                                <input type="text" placeholder="座號 (例:1)" className="w-full p-2 bg-white border rounded-lg text-xs font-bold focus:ring-2 focus:ring-[#00704A] outline-none" value={newStudentData.seatNo} onChange={e => setNewStudentData({...newStudentData, seatNo: e.target.value})} />
                                            </div>
                                            <div className="w-full sm:w-1/4">
                                                <input type="text" placeholder="姓名" className="w-full p-2 bg-white border rounded-lg text-xs font-bold focus:ring-2 focus:ring-[#00704A] outline-none" value={newStudentData.name} onChange={e => setNewStudentData({...newStudentData, name: e.target.value})} />
                                            </div>
                                            <div className="w-full sm:w-1/4">
                                                <input type="text" placeholder="登入密碼 (未填則預設為座號)" className="w-full p-2 bg-white border rounded-lg text-xs font-bold focus:ring-2 focus:ring-[#00704A] outline-none" value={newStudentData.password} onChange={e => setNewStudentData({...newStudentData, password: e.target.value})} />
                                            </div>
                                            <button onClick={handleAddStudent} className="bg-[#00704A] text-white text-xs px-4 py-2 rounded-lg font-bold shadow-md">確定新增</button>
                                        </div>
                                    )}

                                    <div className="overflow-x-auto animate-fade-in">
                                        <table className="min-w-full text-center text-xs">
                                            <thead className="bg-slate-100">
                                                <tr>
                                                    <th className="px-4 py-2 align-bottom font-bold pl-6">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-slate-800">座號</span>
                                                        </div>
                                                    </th>
                                                    <th className="px-4 py-2 align-bottom font-bold">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-slate-800">姓名</span>
                                                        </div>
                                                    </th>
                                                    <th className="px-2 py-2 align-bottom font-bold">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-amber-600">密碼</span>
                                                        </div>
                                                    </th>
                                                    <th className="px-2 py-2 align-bottom font-bold" title="家長登入次數">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-slate-500">👁️登入</span>
                                                        </div>
                                                    </th>
                                                    
                                                    {/* 全新表頭：包含科目、範圍、日期 */}
                                                    {settings.subjects.map(sub => (
                                                        <th key={sub.name} className="px-2 py-2 align-bottom min-w-[80px]" title={`範圍: ${sub.scope || '未填'}\n日期: ${sub.date || '未填'}`}>
                                                            <div className="flex flex-col items-center justify-end h-full gap-0.5">
                                                                <span className="text-sm font-black text-slate-700">{sub.name}</span>
                                                                <span className="text-[10px] text-slate-500 font-bold w-full max-w-[90px] truncate">{sub.scope || '未設定'}</span>
                                                                {sub.date ? <span className="text-[9px] text-slate-400 bg-white border border-slate-200 px-1.5 py-0.5 rounded mt-0.5 shadow-sm">{sub.date}</span> : null}
                                                            </div>
                                                        </th>
                                                    ))}
                                                    
                                                    <th className="px-3 py-2 align-bottom font-bold">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-indigo-700">平均</span>
                                                        </div>
                                                    </th>
                                                    <th className="px-3 py-2 align-bottom font-bold">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-slate-800">總分進步</span>
                                                        </div>
                                                    </th>
                                                    {(settings.examType === '段考' || settings.examType === '模擬考') && (
                                                        <th className="px-2 py-2 align-bottom font-bold">
                                                            <div className="flex flex-col justify-end h-full gap-0.5">
                                                                <span className="text-[13px] font-black text-indigo-600">班排</span>
                                                            </div>
                                                        </th>
                                                    )}
                                                    {(settings.examType === '段考' || settings.examType === '模擬考') && (
                                                        <th className="px-2 py-2 align-bottom font-bold">
                                                            <div className="flex flex-col justify-end h-full gap-0.5">
                                                                <span className="text-[13px] font-black text-purple-600">校排</span>
                                                            </div>
                                                        </th>
                                                    )}
                                                    <th className="px-4 py-2 align-bottom font-bold pr-6">
                                                        <div className="flex flex-col justify-end h-full gap-0.5">
                                                            <span className="text-[13px] font-black text-slate-800">操作</span>
                                                        </div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-medium">
                                                {students.map((s, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-4 py-3.5 pl-6 font-bold text-[#00704A]">{s.seatNo}</td>
                                                        <td className="px-4 py-3.5 font-bold">{s.name}</td>
                                                        <td className="px-2 py-3.5 font-mono text-[10px] text-amber-600 bg-amber-50/50 rounded">{s.password || s.seatNo}</td>
                                                        <td className="px-2 py-3.5 font-bold text-slate-500">
                                                            {s.loginCount > 0 ? <span className="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full">{s.loginCount}</span> : "0"}
                                                        </td>
                                                        {settings.subjects.map(sub => {
                                                            const sc = getStudentScore(s, sub.name);
                                                            const isFail = sc !== null && sc < 60;
                                                            return <td key={sub.name} className={`px-2 py-3.5 ${isFail ? 'text-rose-600 font-bold bg-rose-50' : 'text-slate-700 font-medium'}`}>{sc !== null ? sc.toFixed(1) : "-"}</td>;
                                                        })}
                                                        <td className="px-3 py-3.5 font-extrabold text-indigo-700">{calculateStudentAvg(s).toFixed(1)}</td>
                                                        <td className={`px-3 py-3.5 font-bold whitespace-nowrap ${s.progress > 0 ? 'text-emerald-600' : s.progress < 0 ? 'text-rose-500' : 'text-slate-500'}`}>
                                                            {s.progress > 0 ? `⬆️ +${s.progress}` : s.progress < 0 ? `⬇️ ${Math.abs(s.progress)}` : "0"}
                                                        </td>
                                                        {(settings.examType === '段考' || settings.examType === '模擬考') && (
                                                            <td className="px-2 py-3.5 text-center">
                                                                <div className="font-bold text-indigo-700">{s.classRank || '-'}</div>
                                                                {s.classRankProgress ? <div className={`text-[10px] font-bold ${s.classRankProgress > 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{s.classRankProgress > 0 ? `⬆️+${s.classRankProgress}` : `⬇️${Math.abs(s.classRankProgress)}`}</div> : null}
                                                            </td>
                                                        )}
                                                        {(settings.examType === '段考' || settings.examType === '模擬考') && (
                                                            <td className="px-2 py-3.5 text-center">
                                                                <div className="font-bold text-purple-700">{s.schoolRank || '-'}</div>
                                                                {s.schoolRankProgress ? <div className={`text-[10px] font-bold ${s.schoolRankProgress > 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{s.schoolRankProgress > 0 ? `⬆️+${s.schoolRankProgress}` : `⬇️${Math.abs(s.schoolRankProgress)}`}</div> : null}
                                                            </td>
                                                        )}
                                                        <td className="px-4 py-3.5 text-right pr-6 whitespace-nowrap">
                                                            <button onClick={() => setModifyingStudent(s)} className="text-blue-600 mr-2 hover:scale-110 transition-transform" title="編輯學生密碼與成績">📝</button>
                                                            <button onClick={() => handleDeleteStudent(s)} className="text-rose-600 mr-2 hover:scale-110 transition-transform" title="刪除學生">🗑️</button>
                                                            <button onClick={() => { setCurrentStudent(s); setViewMode('parent-dashboard'); }} className="text-[#00704A] hover:scale-110 transition-transform" title="預覽該生成績單">🔎</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {students.length === 0 && <tr><td colSpan="20" className="py-8 text-slate-400 font-bold text-sm">目前無名單或尚在從雲端串流載入中...</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                        </main>
                    )}
                </div>
            );
        }

        ReactDOM.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
